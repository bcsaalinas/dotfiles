background {
    monitor =
    color = rgba(10, 10, 10, 1.0)
    blur_passes = 0
}

# HOURS
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H")"
    color = rgba(244, 143, 177, 0.9)
    font_size = 160
    font_family = Inter
    position = 0, 200
    halign = center
    valign = center
}

# MINUTES
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%M")"
    color = rgba(244, 143, 177, 0.4)
    font_size = 160
    font_family = Inter
    position = 0, 20
    halign = center
    valign = center
}

# NAME
label {
    monitor =
    text = chromatic
    color = rgba(244, 143, 177, 0.25)
    font_size = 14
    font_family = Inter
    position = 0, -120
    halign = center
    valign = center
}

# INPUT
input-field {
    monitor =
    size = 260, 42
    outline_thickness = 1
    outer_color = rgba(244, 143, 177, 0.3)
    inner_color = rgba(10, 10, 10, 0.0)
    font_color = rgba(244, 143, 177, 0.8)
    fade_on_empty = true
    placeholder_text =
    font_family = Inter
    position = 0, -180
    halign = center
    valign = center
}
